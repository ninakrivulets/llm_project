services:
  traefik:
    image: traefik:v3.4
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=admin@01eg.ru"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - .volumes/letsencrypt:/letsencrypt

  qdrant:
    image: qdrant/qdrant:latest
    environment:
      QDRANT__SERVICE__HOST: "0.0.0.0"
      QDRANT__STORAGE__OPTIMIZE_MEM_USAGE: "true"
      QDRANT__SERVICE__MAX_SEARCH_THREADS: "2"
    volumes:
      - .volumes/qdrant_data:/qdrant/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qdrant.rule=Host(`qdrant.nlp.01eg.ru`)"
      - "traefik.http.routers.qdrant.entrypoints=websecure"
      - "traefik.http.routers.qdrant.tls.certresolver=le"
      - "traefik.http.services.qdrant.loadbalancer.server.port=6333"
      - "traefik.http.routers.qdrant.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=nlp:$$apr1$$gNLztmz1$$y1ZzDze3cJN1FHhE30VlW0"

  phoenix:
    image: arizephoenix/phoenix:latest
    volumes:
      - .volumes/phoenix_data:/data
    environment:
      PHOENIX_WORKING_DIR: /data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phoenix.rule=Host(`traces.nlp.01eg.ru`)"
      - "traefik.http.routers.phoenix.entrypoints=websecure"
      - "traefik.http.routers.phoenix.tls.certresolver=le"
      - "traefik.http.services.phoenix.loadbalancer.server.port=6006"
      - "traefik.http.routers.phoenix.middlewares=auth"

  api:
    build:
      context: ./api
    env_file: .env
    environment:
      QDRANT_URL: "http://qdrant:6333"
      PHOENIX_COLLECTOR_ENDPOINT: "http://phoenix:6006/v1/traces"
    depends_on:
      - qdrant
      - phoenix
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.nlp.01eg.ru`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.http.routers.api.middlewares=auth"

  web:
    build:
      context: ./web
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`ui.nlp.01eg.ru`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=le"
      - "traefik.http.services.web.loadbalancer.server.port=80"
      - "traefik.http.routers.web.middlewares=auth"

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
